language: "en-US"

tone_instructions: >
  Review as a pragmatic Rust teammate. Prioritize correctness, operational safety,
  privacy, and maintainability. Be concise, specific, and action-oriented. Focus
  on meaningful issues rather than style nits that rustfmt or clippy already handle.

reviews:
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  poem: false
  request_changes_workflow: false
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        This is a Rust Discord bot using Serenity, Diesel, Redis, Axum, and Sentry.

        Prioritize these checks:
        - Blocking HTTP, database, and Redis work must not run directly on the async runtime.
          Prefer `tokio::task::spawn_blocking` for blocking work.
        - Long-running Discord command handlers should defer before expensive work.
        - Use `tracing` and `#[instrument]` where they provide useful observability.
        - Avoid exposing secrets, credential-bearing URLs, or raw Discord user IDs.
          Prefer the privacy helpers in `src/utils/privacy.rs`.
        - Prefer `?` and explicit error handling over `unwrap()` in production code.
        - Keep shared embed construction in model/transformer code when possible.

    - path: "src/commands/**/*.rs"
      instructions: |
        For slash commands, verify the newer architecture is followed where practical:
        - Prefer a transport-agnostic core handler plus a thin Serenity adapter in `run()`.
        - For substantial commands, prefer `src/commands/<name>/command.rs`.
        - Check that command behavior matches the registration and dispatch structure in `src/main.rs`.
        - Ensure user-facing failures return clear Discord responses.

    - path: "src/main.rs"
      instructions: |
        Review command registration and dispatch carefully.
        Check startup and shutdown flow, Sentry/tracing setup, and any privacy-sensitive logging.

    - path: "src/server.rs"
      instructions: |
        Review `/healthz` changes for operational safety.
        Check blocking work, graceful shutdown behavior, and useful but non-sensitive logging.

    - path: "src/utils/{database,redis}.rs"
      instructions: |
        Focus on connection safety, error handling, logging quality, and avoiding secret leakage.

    - path: "src/utils/requests/*.rs"
      instructions: |
        Review upstream API handling for resilience, parsing safety, and logging hygiene.

    - path: "src/models/**/*.rs"
      instructions: |
        Prefer shared domain models and transformers over duplicated formatting logic.
        Check that embed-building and response transformation stay consistent with existing patterns.

    - path: "migrations/**/*"
      instructions: |
        Review schema changes carefully.
        Ensure Diesel migrations are coherent and remember that `src/schema.rs` is generated rather than edited manually.

    - path: "src/schema.rs"
      instructions: |
        This file is auto-generated by Diesel.
        Flag any manual edits unless they are clearly generated output tied to a migration change.
