on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag, branch, or SHA to build; deploys only when this resolves to a vX.Y.Z tag"
        required: true
        default: "main"
  push:
    branches:
      - "main"
    paths-ignore:
      - "**/README.md"

name: Build and deploy release

permissions:
  contents: write

jobs:
  build:
    name: Build release binary
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    container: rust:1-bullseye
    outputs:
      is_release: ${{ steps.release-meta.outputs.is_release }}
      tag_name: ${{ steps.release-meta.outputs.tag_name }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0
      - name: Install Rust
        run: |
          toolchain="$(awk -F'"' '/^[[:space:]]*channel[[:space:]]*=/ { print $2 }' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal
      - name: Install dependencies
        run: apt-get update && apt-get install -y libpq-dev
      - name: Determine release metadata
        id: release-meta
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          version="$(awk -F'"' '/^[[:space:]]*version[[:space:]]*=/ { print $2; exit }' Cargo.toml)"
          release="annie-mei@${version}"
          requested_ref="${INPUT_REF}"
          tag_name=""

          if [[ "$requested_ref" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag_name="${requested_ref#refs/tags/}"
          elif [[ "$requested_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag_name="$requested_ref"
          fi

          is_release="false"
          if [[ -n "$tag_name" ]]; then
            is_release="true"
            if [[ "${tag_name#v}" != "$version" ]]; then
              echo "::error::Git tag ${tag_name} does not match Cargo.toml version ${version}"
              exit 1
            fi
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: "true"
          prefix-key: "annie-mei"
          shared-key: "cargo-release"
          save-if: ${{ steps.release-meta.outputs.is_release != 'true' }}
      - name: Build
        run: cargo build --release
      - name: Install sentry-cli
        if: steps.release-meta.outputs.is_release == 'true'
        env:
          SENTRY_CLI_URL: https://github.com/getsentry/sentry-cli/releases/download/3.4.0/sentry-cli-Linux-aarch64
          SENTRY_CLI_SHA256: 1273fe22639e394e0c8d2bd097da13b25139e75e977c5ce44c6f54130664ea45
        run: |
          curl -fsSL "$SENTRY_CLI_URL" -o /usr/local/bin/sentry-cli
          echo "$SENTRY_CLI_SHA256  /usr/local/bin/sentry-cli" | sha256sum --check --strict
          chmod +x /usr/local/bin/sentry-cli
      - name: Create Sentry release
        if: steps.release-meta.outputs.is_release == 'true'
        id: sentry-release
        continue-on-error: true
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ steps.release-meta.outputs.release }}
          set_commits: auto
          ignore_missing: true
          disable_telemetry: true
      - name: Warn on Sentry release failure
        if: steps.sentry-release.outcome == 'failure'
        run: echo "::warning::Sentry release creation failed — commit tracking and release resolution may be incomplete"
      - name: Upload debug symbols to Sentry
        if: steps.release-meta.outputs.is_release == 'true'
        id: sentry-upload
        continue-on-error: true
        run: sentry-cli debug-files upload --include-sources target/release/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Warn on Sentry upload failure
        if: steps.sentry-upload.outcome == 'failure'
        run: echo "::warning::Sentry debug symbol upload failed — stack traces may not be symbolicated"
      - name: Strip binary for deployment
        if: steps.release-meta.outputs.is_release == 'true'
        run: strip target/release/annie-mei
      - name: Prepare artifact
        if: steps.release-meta.outputs.is_release == 'true'
        run: cp target/release/annie-mei ./annie-mei
      - name: Upload artifact
        if: steps.release-meta.outputs.is_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: annie-mei-arm64
          path: |
            annie-mei
            mei.jpg
      - name: Release
        if: steps.release-meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          generate_release_notes: true
          files: |
            target/release/annie-mei
            LICENSE
            mei.jpg

  deploy:
    name: Deploy to Oracle Cloud
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: needs.build.outputs.is_release == 'true'
    env:
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Download artifact
        # upload-artifact latest is v7 while download-artifact latest is v8;
        # download-artifact@v8 supports artifacts created by upload-artifact@v7.
        uses: actions/download-artifact@v8
        with:
          name: annie-mei-arm64
      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version
      - name: Configure SSH via Cloudflare Access
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          {
            printf '%s\n' 'Host oci-via-cloudflare'
            printf '%s\n' '  HostName ${{ secrets.CF_TUNNEL_SSH_HOSTNAME }}'
            printf '%s\n' '  User ${{ secrets.ORACLE_USER }}'
            printf '%s\n' '  IdentityFile ~/.ssh/oracle_key'
            printf '%s\n' '  StrictHostKeyChecking no'
            printf '%s\n' '  UserKnownHostsFile /dev/null'
            printf '%s\n' '  ProxyCommand cloudflared access ssh --hostname %h --id $TUNNEL_SERVICE_TOKEN_ID --secret $TUNNEL_SERVICE_TOKEN_SECRET'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Prepare remote directory
        run: ssh oci-via-cloudflare "mkdir -p /opt/annie-mei/annie-mei.new"
      - name: Copy binary to server
        run: scp annie-mei mei.jpg oci-via-cloudflare:/opt/annie-mei/annie-mei.new/
      - name: Restart service
        run: |
          ssh oci-via-cloudflare <<'EOF'
            cd /opt/annie-mei || exit 1
            chmod +x annie-mei.new/annie-mei
            # Validate new binary before stopping service
            if ! test -x ./annie-mei.new/annie-mei; then
              echo "Binary validation failed"
              exit 1
            fi
            ldd_output=$(ldd ./annie-mei.new/annie-mei 2>&1) || {
              echo "Binary validation failed"
              echo "$ldd_output"
              exit 1
            }
            if echo "$ldd_output" | grep -q "not found"; then
              echo "Binary validation failed"
              exit 1
            fi
            if ! test -f ./annie-mei.new/mei.jpg; then
              echo "Missing mei.jpg"
              exit 1
            fi
            # Backup current binary
            cp annie-mei annie-mei.backup || true
            # Stop, replace, start
            sudo systemctl stop annie-mei
            mv annie-mei.new/annie-mei annie-mei
            cp annie-mei.new/mei.jpg mei.jpg
            rm -rf annie-mei.new
            sudo systemctl start annie-mei
            # Verify service started
            sleep 2
            sudo systemctl is-active annie-mei || {
              echo "Service failed to start, rolling back"
              mv annie-mei.backup annie-mei
              sudo systemctl start annie-mei
              exit 1
            }
            rm -f annie-mei.backup
            printf '%s\t%s\n' "${{ needs.build.outputs.tag_name }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > VERSION
          EOF
      - name: Verify /healthz over Cloudflare
        run: |
          curl --fail --silent --show-error --retry 6 --retry-delay 5 "https://${{ secrets.AUTH_HEALTHZ_HOSTNAME }}/healthz" > healthz.json
          python3 -c 'import json; from pathlib import Path; payload = json.loads(Path("healthz.json").read_text()); assert payload.get("status") == "healthy", f"Unexpected health payload: {payload}"; print("Cloudflare health check passed")'
